name: CI

# Garde-fou du dev asynchrone (plusieurs agents en //). Sans AUCUN secret : ne teste que ce qui
# n'exige pas d'accès Supabase → toujours vert, jamais flaky. La PREUVE d'isolation (isolation.mjs)
# a besoin des clés + comptes de test : la lancer en local ou dans un job dédié à secrets (voir bas).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs obsolètes d'une même branche/PR (économie de minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Typecheck · Build · Tests (sans secret)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Installe tous les workspaces (packages/domain résolu sur src, admin-dashboard, booth-client).
      - name: Install
        run: npm ci

      # `build` inclut déjà `tsc --noEmit` (typecheck strict) puis `vite build` pour chaque app.
      - name: Build admin-dashboard
        run: npm run -w admin-dashboard build

      - name: Build booth-client
        run: npm run -w booth-client build

      # Logique CRITIQUE du domaine : contraste WCAG (F19) + auth opérateur PBKDF2 (CIN-073).
      - name: Test @kioskoscope/domain (domain_smoke)
        run: npm run -w @kioskoscope/domain test

      # Invariants F14 (anneau de focus / intentions) — test DOM-free, sans réseau.
      - name: Test booth-client (focus_smoke)
        run: npm run -w booth-client test

      # Logique cœur cabine : recommandation + gestion de séance (DOM-free).
      - name: Test booth-client (logic_smoke — reco + session)
        run: npm run -w booth-client test:logic

      # Logique pure back-office : tri/KPI/distribution/mappers/formatage (DOM-free, stubs sans réseau).
      - name: Test admin-dashboard (logic_smoke — store/KPI)
        run: npm run -w admin-dashboard test

      # Les scripts de test Supabase ne tournent pas ici (secrets requis) : on vérifie AU MOINS
      # qu'ils restent syntaxiquement valides (pas de rot au fil des migrations).
      - name: Syntax-check des scripts de test Supabase
        run: |
          for f in supabase/tests/*.mjs; do
            echo "node --check $f"
            node --check "$f"
          done

